<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        function isBenignWebsocketError(event) {
          var reason = '';
          if (event && event.reason) {
            reason = event.reason.message || String(event.reason);
          } else if (event && event.message) {
            reason = event.message;
          } else if (event && event.error) {
            reason = event.error.message || String(event.error);
          }
          
          var reasonStr = String(reason).toLowerCase();
          
          if (
            reasonStr.includes('websocket') ||
            reasonStr.includes('failed to connect') ||
            reasonStr.includes('hmr') ||
            reasonStr.includes('closeevent') ||
            reasonStr.includes('headers timeout') ||
            reasonStr.includes('closed without opened')
          ) {
            return true;
          }
          
          if (event && event.reason && typeof event.reason === 'object') {
            var name = event.reason.constructor ? event.reason.constructor.name : '';
            if (name === 'CloseEvent' || name === 'WebSocket' || name === 'ErrorEvent') {
              return true;
            }
          }
          
          return false;
        }

        window.addEventListener('unhandledrejection', function(event) {
          if (isBenignWebsocketError(event)) {
            event.stopImmediatePropagation();
            event.preventDefault();
          }
        }, true);

        window.addEventListener('error', function(event) {
          if (isBenignWebsocketError(event)) {
            event.stopImmediatePropagation();
            event.preventDefault();
          }
        }, true);
      })();

      // Early stashing of beforeinstallprompt event to guarantee zero missing events during React bundle boot
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.deferredPrompt = e;
        if (window.onBeforeInstallPromptTriggered) {
          window.onBeforeInstallPromptTriggered(e);
        }
      });
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIMK Church Management System</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo.jpg" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
